server
{
    listen 80;
    server_name 38.246.237.16;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/38.246.237.16;

    include /www/server/panel/vhost/nginx/well-known/38.246.237.16.conf;
    error_page 404 /404.html;
    include enable-php-00.conf;
    include /www/server/panel/vhost/rewrite/38.246.237.16.conf;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    # Dark 状态栏：跨域 CORS，云酒馆 9001 跨域加载 80 端口的 JS/CSS 必需
    location /dist/Dark/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        try_files $uri $uri/ =404;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log /www/wwwlogs/38.246.237.16.log;
    error_log /www/wwwlogs/38.246.237.16.error.log;
}
